<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lisa — Inca Call Log Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        :root {
            --surface:                   #faf9f5;
            --on-surface:                #1b1c1a;
            --on-surface-variant:        #454835;
            --outline:                   #767963;
            --outline-variant:           #c6c9b0;
            --primary:                   #556500;
            --on-primary:                #ffffff;
            --primary-container:         rgba(154, 181, 10, 0.25);
            --on-primary-container:      #384300;
            --primary-fixed-dim:         #b6d332;
            --secondary-container:       #dde4b2;
            --on-secondary-container:    #5f663e;
            --error-container:           #ffdad6;
            --on-error-container:        #93000a;
            --font-display: "Newsreader", Georgia, serif;
            --font-body:    "Manrope", Arial, sans-serif;
            --font-mono:    "JetBrains Mono", monospace;
            --r-md:   0.5rem;
            --r-lg:   0.75rem;
            --r-xl:   1rem;
            --r-2xl:  1.5rem;
            --r-pill: 9999px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { min-height: 100vh; }
        body { font-family: var(--font-body); background: var(--surface); color: var(--on-surface); position: relative; }

        /* Animated background */
        .bg-canvas { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
        .bg-gradient {
            position: absolute; inset: 0;
            background: linear-gradient(135deg, #faf9f5 0%, #e9e8e4 25%, #f5f4f0 50%, #dde4b2 75%, #faf9f5 100%);
            background-size: 400% 400%;
            animation: gradientShift 20s linear infinite;
        }
        .bg-orb-1 {
            position: absolute; inset: 0;
            background: radial-gradient(circle at 20% 50%, rgba(181, 211, 50, 0.15) 0%, transparent 50%);
            animation: orbFloat1 15s ease-in-out infinite;
        }
        .bg-orb-2 {
            position: absolute; inset: 0;
            background: radial-gradient(circle at 80% 30%, rgba(154, 181, 10, 0.10) 0%, transparent 50%);
            animation: orbFloat2 18s ease-in-out infinite;
        }
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 0%; }
            50%       { background-position: 100% 100%; }
        }
        @keyframes orbFloat1 { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(100px,50px); } }
        @keyframes orbFloat2 { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(-100px,100px); } }

        /* Layout */
        .container { max-width: 1400px; margin: 0 auto; padding: 32px; position: relative; z-index: 1; }

        /* Glass base */
        .glass { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: var(--r-xl); }
        .glass-hero {
            background: rgba(250, 249, 245, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.6);
        }
        .glass-card {
            background: rgba(239, 238, 234, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 24px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.5);
        }
        .glass-item {
            background: rgba(233, 232, 228, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 2px 16px rgba(0,0,0,0.04), inset 0 1px 0 rgba(255,255,255,0.5);
        }

        /* Header */
        .header { display: flex; justify-content: flex-end; margin-bottom: 24px; min-height: 40px; }
        .back-btn {
            display: none; align-items: center; gap: 8px; padding: 8px 18px;
            border-radius: var(--r-pill); border: 1px solid rgba(255,255,255,0.4);
            background: rgba(239,238,234,0.35); backdrop-filter: blur(12px);
            color: var(--on-surface); font-family: var(--font-body); font-size: 14px;
            font-weight: 500; cursor: pointer; transition: border-color 0.2s;
        }
        .back-btn.visible { display: inline-flex; }
        .back-btn:hover { border-color: var(--primary); }

        /* Hero */
        .hero { padding: 48px; margin-bottom: 24px; }
        .hero h1 { font-family: var(--font-display); font-size: 48px; font-weight: 500; line-height: 1.2; letter-spacing: -0.01em; color: var(--on-surface); margin-bottom: 8px; }
        .hero p { font-size: 18px; line-height: 1.6; color: var(--on-surface-variant); }

        /* Stats */
        .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 24px; }
        .stat-card { padding: 24px; }
        .stat-label { font-size: 12px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--on-surface-variant); margin-bottom: 6px; }
        .stat-value { font-family: var(--font-display); font-size: 32px; font-weight: 500; color: var(--on-surface); }

        /* Sessions panel */
        .sessions-panel { padding: 24px; }
        .sessions-panel h2 { font-family: var(--font-display); font-size: 32px; font-weight: 500; line-height: 1.3; color: var(--on-surface); margin-bottom: 16px; }

        /* Filter input */
        .filter-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .filter-input {
            flex: 1; max-width: 400px; padding: 8px 14px;
            background: rgba(239,238,234,0.5); backdrop-filter: blur(8px);
            border: 1px solid var(--outline-variant); border-radius: var(--r-md);
            font-family: var(--font-body); font-size: 14px; color: var(--on-surface); outline: none; transition: border-color 0.2s;
        }
        .filter-input:focus { border-color: var(--primary); }
        .filter-count { font-size: 12px; color: var(--on-surface-variant); }

        /* Session card */
        .session-card { padding: 20px; border-radius: var(--r-lg); cursor: pointer; transition: border-color 0.2s; margin-bottom: 10px; }
        .session-card:last-child { margin-bottom: 0; }
        .session-card:hover { border-color: var(--primary) !important; }

        .session-card-row1 { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
        .session-card-name { font-size: 14px; font-weight: 600; letter-spacing: 0.04em; color: var(--on-surface); }
        .badge { display: inline-block; padding: 3px 10px; border-radius: var(--r-pill); font-size: 11px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }
        .badge-resolved  { background: var(--primary-container);  color: var(--on-primary-container); }
        .badge-progress  { background: var(--error-container);    color: var(--on-error-container); }
        .badge-pending   { background: var(--secondary-container);color: var(--on-secondary-container); }
        .badge-audio     { background: var(--secondary-container);color: var(--on-secondary-container); }

        .session-card-summary { font-size: 14px; line-height: 1.5; color: var(--on-surface-variant); margin-bottom: 10px; }
        .session-card-meta { display: flex; align-items: center; gap: 16px; }
        .session-card-meta-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--on-surface-variant); }
        .session-card-id { margin-left: auto; font-family: var(--font-mono); font-size: 11px; color: var(--outline); letter-spacing: 0.04em; }

        /* Detail view */
        .detail-view { display: none; }
        .detail-view.active { display: block; }
        #mainView.hidden { display: none; }

        /* Detail panels */
        .meta-panel { padding: 24px; margin-bottom: 16px; }
        .meta-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 20px; margin-bottom: 16px; }
        .meta-label { font-size: 12px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--on-surface-variant); margin-bottom: 4px; }
        .meta-value { font-size: 14px; font-weight: 600; color: var(--on-surface); word-break: break-all; }
        .meta-incident { padding-top: 14px; border-top: 1px solid var(--outline-variant); font-size: 14px; color: var(--on-surface-variant); margin-bottom: 14px; }
        .cta-button {
            display: inline-block; padding: 10px 24px; border-radius: var(--r-2xl);
            background: var(--primary); color: var(--on-primary);
            font-family: var(--font-body); font-size: 14px; font-weight: 600;
            letter-spacing: 0.05em; text-transform: uppercase; text-decoration: none;
            border: none; cursor: pointer; transition: background 0.2s, color 0.2s;
        }
        .cta-button:hover { background: var(--primary-container); color: var(--on-primary-container); }

        .audio-panel { padding: 24px; margin-bottom: 16px; }
        .audio-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--on-surface-variant); margin-bottom: 10px; }
        .audio-player { width: 100%; accent-color: var(--primary); }

        .detail-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
        .detail-panel { padding: 24px; }
        .detail-panel h2 { font-family: var(--font-display); font-size: 28px; font-weight: 500; line-height: 1.3; color: var(--on-surface); margin-bottom: 16px; }

        /* Transcript */
        .transcript-scroll { max-height: 560px; overflow-y: auto; padding-right: 4px; }
        .msg { padding: 14px 16px; border-radius: var(--r-lg); margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 2px 12px rgba(0,0,0,0.04), inset 0 1px 0 rgba(255,255,255,0.4); }
        .msg:last-child { margin-bottom: 0; }
        .msg-agent  { background: rgba(221,228,178,0.3); margin-right: 48px; }
        .msg-caller { background: rgba(233,232,228,0.3); margin-left:  48px; }
        .msg-speaker { font-size: 13px; font-weight: 600; letter-spacing: 0.05em; margin-bottom: 5px; }
        .msg-agent  .msg-speaker { color: var(--on-secondary-container); }
        .msg-caller .msg-speaker { color: var(--on-surface); }
        .msg-text { font-size: 14px; line-height: 1.55; }
        .msg-agent  .msg-text { color: var(--on-secondary-container); }
        .msg-caller .msg-text { color: var(--on-surface); }

        /* Extracted data */
        .extracted-scroll { max-height: 560px; overflow-y: auto; padding-right: 4px; }
        .extracted-cat { margin-bottom: 18px; }
        .extracted-cat:last-child { margin-bottom: 0; }
        .extracted-cat-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--on-surface-variant); padding: 0 8px; margin-bottom: 8px; }
        .extracted-field { padding: 10px 12px; border-radius: var(--r-lg); background: rgba(239,238,234,0.3); border: 1px solid rgba(255,255,255,0.4); margin-bottom: 5px; }
        .extracted-field:last-child { margin-bottom: 0; }
        .extracted-field-label { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--on-surface-variant); margin-bottom: 3px; }
        .extracted-field-value { font-size: 14px; font-weight: 600; color: var(--on-surface); }

        /* Stage progress */
        .stages-section { margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--outline-variant); }
        .stages-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--on-surface-variant); margin-bottom: 8px; }
        .stage-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .stage-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .stage-dot-completed { background: var(--primary); }
        .stage-dot-current   { background: var(--primary-fixed-dim); }
        .stage-dot-pending   { background: var(--outline-variant); }
        .stage-name { font-size: 12px; text-transform: capitalize; }
        .stage-completed { color: var(--on-surface); }
        .stage-current   { color: var(--primary); font-weight: 600; }
        .stage-pending   { color: var(--outline); }

        /* States */
        .loading-state { text-align: center; padding: 48px 32px; color: var(--on-surface-variant); font-size: 14px; }
        .empty-state   { text-align: center; padding: 48px 32px; font-family: var(--font-display); font-style: italic; font-size: 22px; color: var(--on-surface-variant); }
        .error-state   { padding: 14px; background: var(--error-container); color: var(--on-error-container); border-radius: var(--r-lg); font-size: 13px; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--outline-variant); border-radius: 6px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--outline); }
    </style>
</head>
<body>
    <div class="bg-canvas">
        <div class="bg-gradient"></div>
        <div class="bg-orb-1"></div>
        <div class="bg-orb-2"></div>
    </div>

    <div class="container">
        <div class="header">
            <button class="back-btn" id="backBtn" onclick="goBackToList()">← Back to overview</button>
        </div>

        <!-- List view -->
        <div id="mainView">
            <div class="glass glass-hero hero">
                <h1>Inca Call Log Manager</h1>
                <p>Review and analyse insurance claims intake calls</p>
            </div>

            <div class="stats-row">
                <div class="glass glass-card stat-card"><div class="stat-label">Total Calls</div><div class="stat-value" id="statTotal">—</div></div>
                <div class="glass glass-card stat-card"><div class="stat-label">Resolved</div><div class="stat-value" id="statResolved">—</div></div>
                <div class="glass glass-card stat-card"><div class="stat-label">In Progress</div><div class="stat-value" id="statInProgress">—</div></div>
                <div class="glass glass-card stat-card"><div class="stat-label">Today</div><div class="stat-value" id="statToday">—</div></div>
            </div>

            <div class="glass glass-hero sessions-panel">
                <h2>All Calls</h2>
                <div class="filter-row">
                    <input id="filterInput" class="filter-input" type="text" placeholder="Search by caller, policy, location…" />
                    <span class="filter-count" id="filterCount"></span>
                </div>
                <div id="content"><div class="loading-state">Loading sessions…</div></div>
            </div>
        </div>

        <!-- Detail view -->
        <div id="detailView" class="detail-view"></div>
    </div>

    <script>
        const API_BASE = '';

        async function fetchSessions() {
            const r = await fetch(`${API_BASE}/api/sessions`);
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            const d = await r.json();
            return d.sessions || [];
        }

        async function fetchEvents(sessionId) {
            try {
                const r = await fetch(`${API_BASE}/api/sessions/${sessionId}/events`);
                if (!r.ok) return [];
                const d = await r.json();
                return d.events || [];
            } catch { return []; }
        }

        function esc(t) {
            const d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML;
        }

        function fmt(key) {
            return key.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }

        function deriveStatus(s) {
            if (s.artifacts?.audio) return 'resolved';
            if (s.stages?.some(st => st.status === 'current')) return 'progress';
            return 'pending';
        }

        function fmtDate(iso) {
            if (!iso) return '—';
            return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        function fmtTime(iso) {
            if (!iso) return '—';
            return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function updateStats(sessions) {
            const today = new Date().toDateString();
            document.getElementById('statTotal').textContent      = sessions.length;
            document.getElementById('statResolved').textContent   = sessions.filter(s => s.artifacts?.audio).length;
            document.getElementById('statInProgress').textContent = sessions.filter(s => deriveStatus(s) === 'progress').length;
            document.getElementById('statToday').textContent      = sessions.filter(s => s.created_at && new Date(s.created_at).toDateString() === today).length;
        }

        function renderCard(s) {
            const state    = s.state || {};
            const caller   = state.caller || state.customer || state.policyholder || {};
            const incident = state.incident || {};
            const name     = caller.full_name || caller.caller_name || 'Unknown caller';
            const raw      = incident.description || '';
            const summary  = raw ? (raw.length > 90 ? raw.slice(0, 90) + '…' : raw)
                           : incident.location ? `Incident at ${esc(incident.location)}`
                           : `Stage: ${s.current_stage || 'intake'}`;
            const st = deriveStatus(s);
            const stLabels = { resolved: 'Resolved', progress: 'In Progress', pending: 'Pending' };

            return `
                <div class="session-card glass glass-item" data-id="${esc(s.session_id)}">
                    <div class="session-card-row1">
                        <span class="session-card-name">${esc(name)}</span>
                        <span class="badge badge-${st}">${stLabels[st]}</span>
                        ${s.artifacts?.audio ? '<span class="badge badge-audio">Audio</span>' : ''}
                    </div>
                    <div class="session-card-summary">${esc(summary)}</div>
                    <div class="session-card-meta">
                        <div class="session-card-meta-item">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                            ${fmtDate(s.created_at)}
                        </div>
                        <div class="session-card-meta-item">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                            ${fmtTime(s.created_at)}
                        </div>
                        <span class="session-card-id">${esc(s.session_id)}</span>
                    </div>
                </div>`;
        }

        let allSessions = [], filteredSessions = [];

        function renderList() {
            const content = document.getElementById('content');
            if (!filteredSessions.length) {
                content.innerHTML = '<div class="empty-state">No sessions match your search.</div>';
                return;
            }
            content.innerHTML = filteredSessions.map(renderCard).join('');
            content.querySelectorAll('.session-card').forEach(el =>
                el.addEventListener('click', () => showDetail(el.dataset.id))
            );
        }

        function filterSessions(q) {
            if (!q.trim()) { filteredSessions = allSessions; }
            else {
                const lq = q.toLowerCase();
                filteredSessions = allSessions.filter(s => {
                    const state = s.state || {};
                    const caller = state.caller || state.customer || {};
                    const incident = state.incident || {};
                    return (caller.full_name || '').toLowerCase().includes(lq)
                        || (caller.policy_number || '').toLowerCase().includes(lq)
                        || (incident.location || '').toLowerCase().includes(lq)
                        || (incident.description || '').toLowerCase().includes(lq)
                        || (s.session_id || '').toLowerCase().includes(lq);
                });
            }
            document.getElementById('filterCount').textContent = `${filteredSessions.length} of ${allSessions.length}`;
            renderList();
        }

        function buildExtracted(state) {
            if (!state) return {};
            const ORDER = ['caller','customer','policyholder','incident','damage','safety','third_parties','services'];
            const LBLS  = { caller:'Caller Information', customer:'Customer Information', policyholder:'Policyholder', incident:'Incident Details', damage:'Damage', safety:'Safety', third_parties:'Third Parties', services:'Services' };
            const out = {};
            const keys = [...ORDER.filter(k => k in state), ...Object.keys(state).filter(k => !ORDER.includes(k) && k !== 'session_id')];
            for (const key of keys) {
                const sec = state[key];
                if (!sec || typeof sec !== 'object' || Array.isArray(sec)) continue;
                const items = [];
                for (const [f, v] of Object.entries(sec)) {
                    if (v === null || v === undefined || v === '') continue;
                    let d;
                    if (typeof v === 'boolean') d = v ? 'Yes' : 'No';
                    else if (Array.isArray(v)) { if (!v.length) continue; d = v.join(', '); }
                    else d = String(v);
                    items.push({ label: fmt(f), value: d });
                }
                if (items.length) out[LBLS[key] || fmt(key)] = items;
            }
            return out;
        }

        function buildTranscript(events) {
            const msgs = events.filter(e => (e.role==='user'||e.role==='agent'||e.role==='model') && (e.content||e.text));
            const groups = [];
            for (const m of msgs) {
                const text = m.content || m.text || '';
                const last = groups[groups.length - 1];
                if (last && last.role === m.role) last.texts.push(text);
                else groups.push({ role: m.role, texts: [text] });
            }
            return groups;
        }

        async function showDetail(sessionId) {
            document.getElementById('mainView').classList.add('hidden');
            const dv = document.getElementById('detailView');
            dv.classList.add('active');
            document.getElementById('backBtn').classList.add('visible');
            setUrlSession(sessionId);

            const s = allSessions.find(x => x.session_id === sessionId);
            if (!s) { dv.innerHTML = '<div class="error-state">Session not found.</div>'; return; }

            const state    = s.state || {};
            const caller   = state.caller || state.customer || state.policyholder || {};
            const incident = state.incident || {};
            const hasAudio = !!s.artifacts?.audio;
            const extracted = buildExtracted(state);

            const incidentParts = [incident.date, incident.time, incident.location].filter(Boolean);
            const incidentLine = incidentParts.length
                ? `<div class="meta-incident"><strong>Incident:</strong> ${esc(incidentParts.join(' · '))}${incident.description ? ' — ' + esc(incident.description) : ''}</div>`
                : '';

            const stagesHtml = s.stages?.length ? `
                <div class="stages-section">
                    <div class="stages-label">Intake Progress</div>
                    ${s.stages.map(st => `
                        <div class="stage-item">
                            <div class="stage-dot stage-dot-${st.status === 'completed' ? 'completed' : st.status === 'current' ? 'current' : 'pending'}"></div>
                            <span class="stage-name stage-${st.status === 'completed' ? 'completed' : st.status === 'current' ? 'current' : 'pending'}">${esc(st.name.replace(/_/g,' '))}</span>
                        </div>`).join('')}
                </div>` : '';

            const extractedHtml = Object.keys(extracted).length
                ? Object.entries(extracted).map(([cat, items]) => `
                    <div class="extracted-cat">
                        <div class="extracted-cat-label">${esc(cat)}</div>
                        ${items.map(i => `
                            <div class="extracted-field">
                                <div class="extracted-field-label">${esc(i.label)}</div>
                                <div class="extracted-field-value">${esc(i.value)}</div>
                            </div>`).join('')}
                    </div>`).join('')
                : '<div style="padding:24px 0;font-size:14px;color:var(--on-surface-variant);font-style:italic">No claim data collected yet.</div>';

            dv.innerHTML = `
                <div class="glass glass-hero meta-panel">
                    <div class="meta-grid">
                        <div><div class="meta-label">Session</div><div class="meta-value" style="font-size:12px">${esc(s.session_id)}</div></div>
                        <div><div class="meta-label">Date</div><div class="meta-value">${fmtDate(s.created_at)}</div></div>
                        <div><div class="meta-label">Time</div><div class="meta-value">${fmtTime(s.created_at)}</div></div>
                        <div><div class="meta-label">Caller</div><div class="meta-value">${esc(caller.full_name || caller.caller_name || '—')}</div></div>
                        <div><div class="meta-label">Policy Number</div><div class="meta-value">${esc(caller.policy_number || '—')}</div></div>
                    </div>
                    ${incidentLine}
                    <div style="padding-top:14px;border-top:1px solid var(--outline-variant)">
                        <a href="https://www.get-inca.com/" target="_blank" rel="noopener noreferrer" class="cta-button">Start Case Processing</a>
                    </div>
                </div>

                <div class="glass glass-card audio-panel">
                    <div class="audio-label">Recording</div>
                    ${hasAudio
                        ? `<audio class="audio-player" controls preload="metadata" src="${API_BASE}/api/sessions/${esc(sessionId)}/audio"></audio>`
                        : `<div style="font-size:13px;color:var(--outline);font-style:italic">No audio recording for this session.</div>`}
                </div>

                <div class="detail-grid">
                    <div class="glass glass-hero detail-panel">
                        <h2>Conversation Transcript</h2>
                        <div class="transcript-scroll" id="transcriptContainer">
                            <div class="loading-state">Loading transcript…</div>
                        </div>
                    </div>
                    <div class="glass glass-hero detail-panel">
                        <h2>Extracted Data</h2>
                        <div class="extracted-scroll">${extractedHtml}</div>
                        ${stagesHtml}
                    </div>
                </div>`;

            loadTranscript(sessionId);
        }

        async function loadTranscript(sessionId) {
            const el = document.getElementById('transcriptContainer');
            if (!el) return;
            const events = await fetchEvents(sessionId);
            const groups = buildTranscript(events);
            if (!groups.length) {
                el.innerHTML = '<div style="padding:24px 0;font-size:14px;color:var(--on-surface-variant);font-style:italic;text-align:center">No transcript available.</div>';
                return;
            }
            el.innerHTML = groups.map(g => {
                const isAgent = g.role !== 'user';
                return `
                    <div class="msg ${isAgent ? 'msg-agent' : 'msg-caller'}">
                        <div class="msg-speaker">${isAgent ? 'Lisa (Agent)' : 'Caller'}</div>
                        <div class="msg-text">${esc(g.texts.join(' ')).replace(/\n/g,'<br>')}</div>
                    </div>`;
            }).join('');
        }

        function getUrlSession() { return new URLSearchParams(window.location.search).get('session'); }
        function setUrlSession(id) {
            const url = new URL(window.location);
            if (id) url.searchParams.set('session', id);
            else url.searchParams.delete('session');
            window.history.pushState({}, '', url);
        }

        function goBackToList() {
            document.getElementById('mainView').classList.remove('hidden');
            const dv = document.getElementById('detailView');
            dv.classList.remove('active');
            dv.innerHTML = '';
            document.getElementById('backBtn').classList.remove('visible');
            setUrlSession(null);
        }

        async function init() {
            try {
                allSessions = await fetchSessions();
                filteredSessions = allSessions;
                updateStats(allSessions);
                document.getElementById('filterCount').textContent = `${allSessions.length} calls`;

                if (!allSessions.length) {
                    document.getElementById('content').innerHTML = '<div class="empty-state">No sessions yet. Start a call to see it here.</div>';
                    return;
                }

                renderList();

                document.getElementById('filterInput').addEventListener('input', e => filterSessions(e.target.value));

                const urlId = getUrlSession();
                if (urlId) await showDetail(urlId);

            } catch (err) {
                document.getElementById('content').innerHTML = `<div class="error-state">Failed to load sessions: ${esc(err.message)}</div>`;
            }
        }

        setInterval(() => {
            if (!document.getElementById('detailView').classList.contains('active')) init();
        }, 30000);

        init();
    </script>
</body>
</html>
