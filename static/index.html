<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Conversations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        /* ── Design System: Modern Organic Minimalist ─────────────────── */
        :root {
            --surface:                   #faf9f5;
            --surface-dim:               #dbdad6;
            --surface-container-lowest:  #ffffff;
            --surface-container-low:     #f5f4f0;
            --surface-container:         #efeeea;
            --surface-container-high:    #e9e8e4;
            --surface-container-highest: #e3e2df;
            --on-surface:                #1b1c1a;
            --on-surface-variant:        #454835;
            --inverse-surface:           #30312e;
            --inverse-on-surface:        #f2f1ed;
            --outline:                   #767963;
            --outline-variant:           #c6c9b0;

            --primary:                   #556500;
            --on-primary:                #ffffff;
            --primary-container:         #9ab50a;
            --on-primary-container:      #384300;
            --inverse-primary:           #b6d332;
            --primary-fixed:             #d2f04e;
            --primary-fixed-dim:         #b6d332;
            --on-primary-fixed:          #181e00;
            --on-primary-fixed-variant:  #3f4c00;

            --secondary:                 #5b623a;
            --on-secondary:              #ffffff;
            --secondary-container:       #dde4b2;
            --on-secondary-container:    #5f663e;

            --error:                     #ba1a1a;
            --error-container:           #ffdad6;
            --on-error-container:        #93000a;

            --font-display: "Newsreader", Georgia, "Times New Roman", serif;
            --font-body:    "Manrope", "Helvetica Neue", Arial, sans-serif;
            --font-mono:    "JetBrains Mono", ui-monospace, "SF Mono", monospace;

            --r-sm:   0.25rem;
            --r-md:   0.5rem;
            --r-lg:   0.75rem;
            --r-xl:   1rem;
            --r-2xl:  1.5rem;
            --r-pill: 9999px;

            --sp-1: 4px;
            --sp-2: 8px;
            --sp-3: 12px;
            --sp-4: 24px;
            --sp-5: 32px;
            --sp-6: 48px;
            --sp-7: 80px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--surface);
            color: var(--on-surface);
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: var(--sp-5);
        }

        /* ── Header ── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--sp-4);
            padding-bottom: var(--sp-4);
            border-bottom: 1px solid var(--outline-variant);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: var(--sp-4);
        }

        .inca-logo-img {
            height: 48px;
            width: auto;
            object-fit: contain;
        }

        .header-nav {
            display: flex;
            align-items: center;
            gap: var(--sp-3);
        }

        h1 {
            font-family: var(--font-display);
            font-size: 48px;
            font-weight: 500;
            letter-spacing: -0.01em;
            line-height: 1.2;
            color: var(--on-surface);
        }

        .back-btn {
            display: none;
            align-items: center;
            gap: var(--sp-2);
            padding: 8px 18px;
            background: transparent;
            border: 1px solid var(--outline-variant);
            border-radius: var(--r-pill);
            color: var(--on-surface-variant);
            font-family: var(--font-body);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
        }

        .back-btn.visible { display: inline-flex; }
        .back-btn:hover { border-color: var(--outline); color: var(--on-surface); }

        .cta-button {
            display: inline-flex;
            align-items: center;
            gap: var(--sp-2);
            padding: 12px 24px;
            background: var(--primary);
            color: var(--on-primary);
            border: none;
            border-radius: var(--r-pill);
            font-family: var(--font-body);
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            box-shadow: 0 2px 8px rgba(85, 101, 0, 0.2);
        }

        .cta-button:hover {
            opacity: 0.9;
        }

        .cta-button:active {
            opacity: 0.8;
        }

        /* ── Filters ── */
        .filters {
            background: var(--surface-container-low);
            border: 1px solid var(--outline-variant);
            border-radius: var(--r-xl);
            padding: 12px var(--sp-4);
            margin-bottom: var(--sp-4);
            display: flex;
            gap: var(--sp-3);
            align-items: center;
        }

        .filter-label {
            font-family: var(--font-body);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--outline);
            flex-shrink: 0;
        }

        .filter-input {
            flex: 1;
            max-width: 400px;
            padding: 8px 14px;
            background: var(--surface-container-lowest);
            border: 1px solid var(--outline-variant);
            border-radius: var(--r-md);
            color: var(--on-surface);
            font-family: var(--font-body);
            font-size: 14px;
        }

        .filter-input::placeholder { color: var(--outline); }
        .filter-input:focus { outline: none; border-color: var(--primary); }

        .filter-stats {
            font-family: var(--font-body);
            font-size: 12px;
            font-weight: 500;
            color: var(--outline);
            margin-left: auto;
        }

        /* ── Session list ── */
        .sessions-list { display: grid; gap: var(--sp-3); }
        .sessions-list.hidden { display: none; }
        .session-detail-view { display: none; }
        .session-detail-view.active { display: block; }

        /* ── Sessions Table ── */
        .sessions-table-container {
            background: var(--surface-container-lowest);
            border: 1px solid var(--outline-variant);
            border-radius: var(--r-xl);
            overflow: hidden;
        }

        .sessions-table {
            width: 100%;
            border-collapse: collapse;
        }

        .sessions-table thead {
            background: var(--surface-container);
        }

        .sessions-table th {
            padding: var(--sp-3) var(--sp-4);
            text-align: left;
            font-family: var(--font-body);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--outline);
            border-bottom: 1px solid var(--outline-variant);
        }

        .session-row {
            cursor: pointer;
            transition: background-color 0.15s;
            border-bottom: 1px solid var(--outline-variant);
        }

        .session-row:last-child {
            border-bottom: none;
        }

        .session-row:hover {
            background: var(--surface-container-low);
        }

        .sessions-table td {
            padding: var(--sp-3) var(--sp-4);
            font-family: var(--font-body);
        }

        .session-date-cell {
            font-size: 14px;
            font-weight: 500;
            color: var(--on-surface);
            white-space: nowrap;
        }

        .session-time-cell {
            font-size: 13px;
            font-weight: 400;
            color: var(--on-surface-variant);
            white-space: nowrap;
            font-family: var(--font-mono);
        }

        .session-policy-cell {
            font-size: 13px;
            font-weight: 400;
            color: var(--on-surface-variant);
        }

        .session-customer-cell {
            font-size: 13px;
            font-weight: 400;
            color: var(--on-surface-variant);
        }

        .session-location-cell {
            font-size: 13px;
            font-weight: 400;
            color: var(--on-surface-variant);
        }

        /* Legacy card styles (kept for detail view) */
        .session-card {
            background: var(--surface-container-lowest);
            border: 1px solid var(--outline-variant);
            border-radius: var(--r-xl);
            padding: var(--sp-4);
            cursor: pointer;
            transition: border-color 0.15s;
        }

        .session-card:hover { border-color: var(--outline); }

        .session-header {
            display: flex;
            flex-direction: row;
            justify-content: flex-end;
            align-items: flex-start;
        }

        .session-info {
            display: flex;
            flex-direction: column;
            gap: var(--sp-1);
        }

        .session-id {
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.08em;
            color: var(--outline);
            text-transform: uppercase;
        }

        .session-date {
            font-size: 15px;
            font-weight: 600;
            color: var(--on-surface);
            font-family: var(--font-body);
        }

        .session-detail {
            font-size: 13px;
            font-weight: 400;
            color: var(--on-surface-variant);
            font-family: var(--font-body);
        }

        .session-stage {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: var(--r-pill);
            font-family: var(--font-body);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            background: var(--secondary-container);
            color: var(--on-secondary-container);
        }

        .session-stage::before {
            content: "";
            width: 6px; height: 6px;
            border-radius: var(--r-pill);
            background: var(--secondary);
        }

        /* ── Artifacts ── */
        .artifacts {
            display: flex;
            gap: var(--sp-2);
            margin-top: var(--sp-3);
            flex-wrap: wrap;
        }

        .artifact {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-family: var(--font-body);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            padding: 3px 10px;
            border-radius: var(--r-pill);
            background: var(--surface-container);
            color: var(--outline);
            border: 1px solid var(--outline-variant);
        }

        .artifact.available {
            background: var(--secondary-container);
            color: var(--on-secondary-container);
            border-color: transparent;
        }

        .artifact.available::before {
            content: "";
            width: 5px; height: 5px;
            border-radius: var(--r-pill);
            background: var(--secondary);
        }

        /* ── Stages ── */
        .stages {
            margin-top: var(--sp-3);
            display: flex;
            flex-wrap: wrap;
            gap: var(--sp-2);
        }

        .stage-item {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: var(--r-pill);
            font-family: var(--font-body);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .stage-item.completed {
            background: var(--secondary-container);
            color: var(--on-secondary-container);
        }

        .stage-item.completed::before {
            content: "";
            width: 5px; height: 5px;
            border-radius: var(--r-pill);
            background: var(--secondary);
        }

        .stage-item.current {
            background: var(--primary-fixed);
            color: var(--on-primary-fixed);
        }

        .stage-item.current::before {
            content: "";
            width: 5px; height: 5px;
            border-radius: var(--r-pill);
            background: var(--primary);
        }

        .stage-item.pending {
            background: var(--surface-container-high);
            color: var(--outline);
        }

        .stage-item.skipped {
            background: var(--surface-container);
            color: var(--outline);
            opacity: 0.5;
            text-decoration: line-through;
        }

        /* ── Conversation area ── */
        .conversation {
            margin-top: var(--sp-4);
            padding-top: var(--sp-4);
            border-top: 1px solid var(--outline-variant);
            display: none;
        }

        .conversation.active { display: block; }

        .conversation-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--sp-4);
        }

        .conversation-title {
            font-family: var(--font-body);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--outline);
            display: flex;
            align-items: center;
            gap: var(--sp-2);
        }

        .transcript-badge {
            display: inline-block;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 8px;
            font-weight: 500;
        }

        .transcript-badge.gradium {
            background: var(--primary-container);
            color: var(--on-primary-container);
        }

        .transcript-badge.gemini {
            background: var(--surface-variant);
            color: var(--on-surface-variant);
        }

        .timestamp {
            font-size: 11px;
            color: var(--on-surface-variant);
            font-family: var(--font-mono);
        }

        .message-header {
            display: flex;
            align-items: center;
            margin-bottom: 4px;
            gap: 8px;
        }

        .close-conversation-btn {
            background: transparent;
            border: 1px solid var(--outline-variant);
            padding: 6px 14px;
            border-radius: var(--r-pill);
            font-family: var(--font-body);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            color: var(--on-surface-variant);
            letter-spacing: 0.04em;
            transition: border-color 0.15s, color 0.15s;
        }

        .close-conversation-btn:hover { border-color: var(--outline); color: var(--on-surface); }

        /* ── Message bubbles ── */
        .message {
            margin-bottom: var(--sp-3);
            display: flex;
            align-items: flex-start;
            gap: var(--sp-2);
        }

        .message.user { flex-direction: row-reverse; }

        .message-wrapper {
            padding: 12px 16px;
            border-radius: var(--r-lg);
            max-width: 80%;
            position: relative;
        }

        .message.user .message-wrapper {
            background: var(--inverse-surface);
            color: var(--inverse-on-surface);
        }

        .message.agent .message-wrapper {
            background: var(--surface-container-lowest);
            color: var(--on-surface);
            border: 1px solid var(--outline-variant);
        }

        .message-text {
            font-size: 14px;
            line-height: 1.6;
        }

        .message-actions { flex-shrink: 0; margin-top: 2px; }

        .add-note-btn {
            background: transparent;
            border: 1px solid var(--outline-variant);
            padding: 4px 10px;
            border-radius: var(--r-pill);
            font-family: var(--font-body);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.04em;
            cursor: pointer;
            color: var(--outline);
            white-space: nowrap;
            transition: border-color 0.15s, color 0.15s;
        }

        .add-note-btn:hover { border-color: var(--outline); color: var(--on-surface-variant); }

        /* ── Note input ── */
        .note-input {
            display: none;
            position: absolute;
            left: 0; right: 0; top: 100%;
            z-index: 10;
            margin-top: var(--sp-2);
            background: var(--surface-container-lowest);
            padding: var(--sp-3);
            border: 1px solid var(--outline-variant);
            border-radius: var(--r-lg);
        }

        .note-input.active { display: block; }

        .note-input textarea {
            width: 100%;
            padding: var(--sp-2) var(--sp-3);
            border: 1px solid var(--outline-variant);
            border-radius: var(--r-md);
            font-family: var(--font-body);
            font-size: 13px;
            color: var(--on-surface);
            background: var(--surface);
            resize: vertical;
            min-height: 70px;
        }

        .note-input textarea:focus { outline: none; border-color: var(--primary); }

        .note-input-actions {
            margin-top: var(--sp-2);
            display: flex;
            gap: var(--sp-2);
        }

        .note-input-actions button {
            padding: 7px 16px;
            border: none;
            border-radius: var(--r-pill);
            font-family: var(--font-body);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .save-note-btn { background: var(--primary); color: var(--on-primary); }
        .save-note-btn:hover { opacity: 0.85; }

        .cancel-note-btn {
            background: transparent;
            color: var(--on-surface-variant);
            border: 1px solid var(--outline-variant) !important;
        }

        .cancel-note-btn:hover { border-color: var(--outline) !important; }

        /* ── Message notes ── */
        .message-note {
            margin-top: var(--sp-3);
            padding: var(--sp-2) var(--sp-3);
            background: var(--primary-fixed);
            border-left: 3px solid var(--primary);
            border-radius: var(--r-sm);
            font-size: 12.5px;
            line-height: 1.5;
            color: var(--on-primary-fixed);
        }

        .message.user .message-note {
            background: rgba(210, 240, 78, 0.12);
            border-left-color: var(--primary-fixed-dim);
            color: var(--primary-fixed);
        }

        .note-header {
            font-family: var(--font-body);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.6;
            margin-bottom: var(--sp-2);
        }

        /* ── Loading / error / empty ── */
        .loading {
            text-align: center;
            padding: var(--sp-6);
            color: var(--outline);
            font-family: var(--font-body);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .error {
            padding: var(--sp-4);
            background: var(--error-container);
            color: var(--on-error-container);
            border: 1px solid var(--error);
            border-radius: var(--r-md);
            margin: var(--sp-3) 0;
            font-size: 13px;
        }

        .no-sessions {
            text-align: center;
            padding: var(--sp-7) var(--sp-5);
            color: var(--outline);
            font-family: var(--font-display);
            font-style: italic;
            font-size: 28px;
        }

        /* ── Section dividers (audio, claim) ── */
        .section-label {
            font-family: var(--font-body);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--outline);
            margin-bottom: var(--sp-3);
        }

        .audio-section {
            margin-top: var(--sp-4);
            padding-top: var(--sp-4);
            border-top: 1px solid var(--outline-variant);
        }

        .audio-player {
            width: 100%;
            accent-color: var(--primary);
        }

        /* ── Claim State Accordion ── */
        .claim-section {
            margin-top: var(--sp-4);
        }

        .claim-section-header {
            font-family: var(--font-body);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--outline);
            margin-bottom: var(--sp-3);
        }

        .claim-key-details {
            padding: var(--sp-4);
            background: var(--surface-container-lowest);
            border: 1px solid var(--outline-variant);
            border-radius: var(--r-xl);
            margin-bottom: var(--sp-3);
        }

        .claim-accordion {
            margin-top: var(--sp-3);
            border: 1px solid var(--outline-variant);
            border-radius: var(--r-xl);
            overflow: hidden;
        }

        .claim-accordion-btn {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            background: var(--surface-container-low);
            border: none;
            cursor: pointer;
            text-align: left;
            transition: background 0.15s;
            gap: var(--sp-2);
        }

        .claim-accordion-btn:hover { background: var(--surface-container); }

        .claim-accordion-label {
            font-family: var(--font-body);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--on-surface-variant);
        }

        .claim-accordion-chevron {
            flex-shrink: 0;
            color: var(--outline);
            transition: transform 0.2s ease;
        }

        .claim-accordion-chevron.open { transform: rotate(180deg); }

        .claim-accordion-body {
            display: none;
            padding: var(--sp-4);
            border-top: 1px solid var(--outline-variant);
            background: var(--surface-container-lowest);
        }

        .claim-accordion-body.open { display: block; }

        /* Metadata badges */
        .claim-meta {
            display: flex;
            flex-wrap: wrap;
            gap: var(--sp-2);
            margin-bottom: var(--sp-4);
        }

        .claim-meta-badge {
            padding: 3px 10px;
            border-radius: var(--r-pill);
            font-family: var(--font-body);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            background: var(--secondary-container);
            color: var(--on-secondary-container);
        }

        .claim-meta-warn {
            background: oklch(92% 0.07 55);
            color: oklch(32% 0.12 55);
        }

        .claim-meta-ok {
            background: var(--primary-fixed);
            color: var(--on-primary-fixed);
        }

        /* Claim sections */
        .claim-sections { display: flex; flex-direction: column; gap: var(--sp-4); }

        .claim-fields-with-cta {
            position: relative;
        }

        .cta-overlay {
            position: absolute;
            top: 24px;
            right: 0;
            transform: translateY(-50%);
            z-index: 1;
        }

        .claim-section-title {
            font-family: var(--font-body);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--outline);
            padding-bottom: var(--sp-2);
            margin-bottom: var(--sp-3);
            border-bottom: 1px solid var(--outline-variant);
        }

        .claim-fields {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: var(--sp-3) var(--sp-4);
        }

        .claim-field-label {
            font-family: var(--font-body);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--outline);
            margin-bottom: 3px;
        }

        .claim-field-value {
            font-size: 14px;
            font-weight: 500;
            color: var(--on-surface);
            line-height: 1.4;
        }

        .claim-bool-pill {
            display: inline-block;
            padding: 2px 9px;
            border-radius: var(--r-pill);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.04em;
        }

        .claim-bool-pill.yes {
            background: var(--primary-fixed);
            color: var(--on-primary-fixed);
        }

        .claim-bool-pill.no {
            background: var(--surface-container-high);
            color: var(--outline);
        }

        .claim-no-data {
            font-size: 13px;
            color: var(--outline);
            font-style: italic;
            padding: 4px 0;
        }

        /* ── Claim split view ── */
        .claim-split {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--sp-4);
            align-items: start;
        }

        .claim-col-header {
            font-family: var(--font-body);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--outline);
            margin-bottom: var(--sp-3);
        }

        .claim-raw-panel {
            background: var(--inverse-surface);
            border-radius: var(--r-lg);
            padding: var(--sp-4);
            max-height: 520px;
            overflow-y: auto;
            overflow-x: auto;
        }

        .claim-raw-panel pre {
            font-family: var(--font-mono);
            font-size: 11.5px;
            color: var(--inverse-on-surface);
            line-height: 1.65;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .cj-key  { color: var(--primary-fixed-dim); }
        .cj-str  { color: var(--inverse-on-surface); }
        .cj-num  { color: oklch(75% 0.12 200); }
        .cj-bool { color: var(--primary-fixed); }
        .cj-null { color: var(--outline); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <img src="/static/inca_logo.png" alt="Inca Logo" class="inca-logo-img">
                <h1>Call Log Manager</h1>
            </div>
            <div class="header-nav">
                <button class="back-btn" id="backBtn" onclick="goBackToList()">
                    ← Back to sessions
                </button>
            </div>
        </div>

        <div id="mainView">
            <div class="filters">
                <span class="filter-label">Filter</span>
                <input
                    type="text"
                    class="filter-input"
                    id="filterInput"
                    placeholder="Search by date, time, policy, customer, or location..."
                />
                <span class="filter-stats" id="filterStats"></span>
            </div>
            <div id="content"></div>
        </div>

        <div id="detailView" class="session-detail-view"></div>
    </div>

    <script>
        const API_BASE = '';

        async function fetchSessions() {
            try {
                const response = await fetch(`${API_BASE}/api/sessions`);
                if (!response.ok) {
                    throw new Error(`API returned ${response.status}: ${response.statusText}`);
                }
                const data = await response.json();
                console.log('Sessions data:', data);
                return data.sessions || [];
            } catch (error) {
                console.error('Error fetching sessions:', error);
                throw error;
            }
        }

        async function fetchEvents(sessionId) {
            try {
                const response = await fetch(`${API_BASE}/api/sessions/${sessionId}/events`);
                if (!response.ok) {
                    console.warn(`Events not available for ${sessionId}`);
                    return [];
                }
                const data = await response.json();
                console.log('Events for', sessionId, ':', data);
                return data.events || [];
            } catch (error) {
                console.error('Error fetching events:', error);
                return [];
            }
        }

        async function fetchTranscript(sessionId) {
            try {
                const response = await fetch(`${API_BASE}/api/sessions/${sessionId}/transcript`);
                if (!response.ok) {
                    throw new Error('Transcript not available');
                }
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Failed to fetch transcript:', error);
                return null;
            }
        }

        async function checkTranscriptStatus(sessionId) {
            try {
                const response = await fetch(`${API_BASE}/api/sessions/${sessionId}/transcript/status`);
                const data = await response.json();
                return data;
            } catch (error) {
                return { gradium_available: false, gemini_available: false };
            }
        }

        function formatDate(dateString) {
            if (!dateString) return 'Unknown';
            const date = new Date(dateString);
            return date.toLocaleString();
        }

        function renderMessage(group, index, sessionId) {
            const isUser = group.role === 'user';
            const role = isUser ? 'Caller' : 'Agent';
            const text = group.texts.join(' ');
            const messageId = `${sessionId}::g${index}`;
            const note = getNoteForMessage(messageId);

            return `
                <div class="message ${isUser ? 'user' : 'agent'}" data-message-id="${messageId}">
                    <div class="message-wrapper">
                        <div class="message-text">${escapeHtml(text).replace(/\n/g, '<br>')}</div>
                        ${note ? `
                            <div class="message-note">
                                <div class="note-header">Note</div>
                                ${escapeHtml(note)}
                            </div>
                        ` : ''}
                        <div class="note-input" id="note-input-${messageId}">
                            <textarea placeholder="Add a note about this message..."></textarea>
                            <div class="note-input-actions">
                                <button class="save-note-btn" onclick="saveNote('${messageId}')">Save</button>
                                <button class="cancel-note-btn" onclick="cancelNote('${messageId}')">Cancel</button>
                            </div>
                        </div>
                    </div>
                    <div class="message-actions">
                        <button class="add-note-btn" onclick="toggleNoteInput('${messageId}')">
                            ${note ? 'Edit note' : 'Add note'}
                        </button>
                    </div>
                </div>
            `;
        }

        function colorizeJson(obj) {
            const raw = JSON.stringify(obj, null, 2);
            return raw.replace(
                /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+\.?\d*([eE][+-]?\d+)?)/g,
                m => {
                    if (/^"/.test(m)) return m.endsWith(':') ? `<span class="cj-key">${m}</span>` : `<span class="cj-str">${m}</span>`;
                    if (/true|false/.test(m)) return `<span class="cj-bool">${m}</span>`;
                    if (/null/.test(m))       return `<span class="cj-null">${m}</span>`;
                    return `<span class="cj-num">${m}</span>`;
                }
            );
        }

        function toggleClaimBody(sessionId) {
            const body = document.getElementById(`claim-body-${sessionId}`);
            const icon = document.getElementById(`claim-icon-${sessionId}`);
            if (!body) return;
            const open = body.classList.toggle('open');
            icon.classList.toggle('open', open);
        }

        function renderClaimField(label, value) {
            let inner;
            if (typeof value === 'boolean') {
                inner = `<span class="claim-bool-pill ${value ? 'yes' : 'no'}">${value ? 'Yes' : 'No'}</span>`;
            } else {
                inner = `<span class="claim-field-value">${escapeHtml(String(value))}</span>`;
            }
            return `<div class="claim-field"><div class="claim-field-label">${label}</div>${inner}</div>`;
        }

        function renderKeyClaimDetails(state) {
            if (!state) return '<p class="claim-no-data">No claim data available.</p>';

            const isFilled = v => v !== null && v !== undefined && v !== '' && !(Array.isArray(v) && v.length === 0);

            const keyFields = [
                { title: 'Customer', fields: [
                    ['Policy number',    state.customer?.policy_number],
                    ['Identity verified',state.customer?.identity_verified],
                    ['Is policyholder',  state.customer?.is_policyholder],
                ]},
                { title: 'Incident', fields: [
                    ['Date',        state.incident?.date],
                    ['Time',        state.incident?.time],
                    ['Location',    state.incident?.location],
                    ['Description', state.incident?.description],
                ]},
            ];

            const filledSections = keyFields
                .map(s => ({ ...s, fields: s.fields.filter(([, v]) => isFilled(v)) }))
                .filter(s => s.fields.length > 0);

            if (filledSections.length === 0)
                return '<p class="claim-no-data">No key claim details collected yet.</p>';

            return `
                <div class="claim-sections">
                    ${filledSections.map((s, idx) => `
                        <div>
                            <div class="claim-section-title">${s.title}</div>
                            <div class="claim-fields ${idx === 0 ? 'claim-fields-with-cta' : ''}">
                                ${s.fields.map(([label, value]) => renderClaimField(label, value)).join('')}
                                ${idx === 0 ? `
                                    <a href="https://www.get-inca.com/" target="_blank" rel="noopener noreferrer" class="cta-button cta-overlay">
                                        Start Case Processing
                                    </a>
                                ` : ''}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderAdditionalClaimDetails(state) {
            if (!state) return '<p class="claim-no-data">No additional data available.</p>';

            const isFilled = v => v !== null && v !== undefined && v !== '' && !(Array.isArray(v) && v.length === 0);

            const additionalFields = [
                { title: 'Customer (Additional)', fields: [
                    ['Name',             state.customer?.full_name],
                    ['Date of birth',    state.customer?.date_of_birth],
                    ['Contact method',   state.customer?.preferred_contact_method],
                    ['Caller name',      state.customer?.caller_name],
                    ['Relationship',     state.customer?.relationship_to_policyholder],
                ]},
                { title: 'Damage', fields: [
                    ['Items',            Array.isArray(state.damage?.items) && state.damage.items.length ? state.damage.items.join(', ') : null],
                    ['Description',      state.damage?.description],
                    ['Estimated value',  state.damage?.estimated_value],
                    ['Photos available', state.damage?.photos_available],
                ]},
                { title: 'Safety', fields: [
                    ['Injuries',              state.safety?.injuries],
                    ['Police report',         state.safety?.police_report],
                    ['Police report details', state.safety?.police_report_details],
                    ['Urgent risk',           state.safety?.urgent_risk],
                ]},
                { title: 'Third Parties', fields: [
                    ['Involved',     state.third_parties?.involved],
                    ['Details',      state.third_parties?.details],
                    ['Witness info', state.third_parties?.witness_info],
                ]},
                { title: 'Services', fields: [
                    ['Rental car needed',      state.services?.rental_car_needed],
                    ['Rental car preference',  state.services?.rental_car_preference],
                    ['Repair shop selected',   state.services?.repair_shop_selected],
                    ['Repair shop preference', state.services?.repair_shop_preference],
                ]},
                { title: 'Documents', fields: [
                    ['Photos',       state.documents?.photos],
                    ['Receipts',     state.documents?.receipts],
                    ['Police report',state.documents?.police_report],
                ]},
            ];

            const filledSections = additionalFields
                .map(s => ({ ...s, fields: s.fields.filter(([, v]) => isFilled(v)) }))
                .filter(s => s.fields.length > 0);

            if (filledSections.length === 0)
                return '<p class="claim-no-data">No additional details collected yet.</p>';

            return `
                <div class="claim-sections">
                    ${filledSections.map(s => `
                        <div>
                            <div class="claim-section-title">${s.title}</div>
                            <div class="claim-fields">
                                ${s.fields.map(([label, value]) => renderClaimField(label, value)).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderClaimState(state) {
            if (!state) return '<p class="claim-no-data">No claim data collected yet.</p>';

            const isFilled = v => v !== null && v !== undefined && v !== '' && !(Array.isArray(v) && v.length === 0);

            const sections = [
                { title: 'Customer', fields: [
                    ['Name',             state.customer?.full_name],
                    ['Policy number',    state.customer?.policy_number],
                    ['Date of birth',    state.customer?.date_of_birth],
                    ['Contact method',   state.customer?.preferred_contact_method],
                    ['Identity verified',state.customer?.identity_verified],
                    ['Is policyholder',  state.customer?.is_policyholder],
                    ['Caller name',      state.customer?.caller_name],
                    ['Relationship',     state.customer?.relationship_to_policyholder],
                ]},
                { title: 'Incident', fields: [
                    ['Date',        state.incident?.date],
                    ['Time',        state.incident?.time],
                    ['Location',    state.incident?.location],
                    ['Description', state.incident?.description],
                ]},
                { title: 'Damage', fields: [
                    ['Items',            Array.isArray(state.damage?.items) && state.damage.items.length ? state.damage.items.join(', ') : null],
                    ['Description',      state.damage?.description],
                    ['Estimated value',  state.damage?.estimated_value],
                    ['Photos available', state.damage?.photos_available],
                ]},
                { title: 'Safety', fields: [
                    ['Injuries',              state.safety?.injuries],
                    ['Police report',         state.safety?.police_report],
                    ['Police report details', state.safety?.police_report_details],
                    ['Urgent risk',           state.safety?.urgent_risk],
                ]},
                { title: 'Third Parties', fields: [
                    ['Involved',     state.third_parties?.involved],
                    ['Details',      state.third_parties?.details],
                    ['Witness info', state.third_parties?.witness_info],
                ]},
                { title: 'Services', fields: [
                    ['Rental car needed',      state.services?.rental_car_needed],
                    ['Rental car preference',  state.services?.rental_car_preference],
                    ['Repair shop selected',   state.services?.repair_shop_selected],
                    ['Repair shop preference', state.services?.repair_shop_preference],
                ]},
                { title: 'Documents', fields: [
                    ['Photos',       state.documents?.photos],
                    ['Receipts',     state.documents?.receipts],
                    ['Police report',state.documents?.police_report],
                ]},
            ];

            const filledSections = sections
                .map(s => ({ ...s, fields: s.fields.filter(([, v]) => isFilled(v)) }))
                .filter(s => s.fields.length > 0);

            if (filledSections.length === 0)
                return '<p class="claim-no-data">No claim data collected yet.</p>';

            return `
                <div class="claim-sections">
                    ${filledSections.map(s => `
                        <div>
                            <div class="claim-section-title">${s.title}</div>
                            <div class="claim-fields">
                                ${s.fields.map(([label, value]) => renderClaimField(label, value)).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTimestamp(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function renderGradiumTranscript(sessionId, container, transcript) {
            const segments = transcript.segments || [];

            if (segments.length === 0) {
                container.innerHTML = '<div class="empty">No transcript segments</div>';
                return;
            }

            const messagesHtml = segments.map((segment, idx) => {
                const timestamp = formatTimestamp(segment.start_s || 0);

                return `
                    <div class="message" data-idx="${idx}">
                        <div class="message-header">
                            <span class="timestamp">${timestamp}</span>
                        </div>
                        <div class="message-wrapper">
                            <div class="message-text">${escapeHtml(segment.text)}</div>
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = `
                <div class="conversation-header">
                    <div class="conversation-title">
                        Conversation
                        <span class="transcript-badge gradium">Gradium AI</span>
                    </div>
                </div>
                ${messagesHtml}
            `;
        }

        function renderGeminiTranscript(sessionId, container, transcriptText) {
            // Use existing event-based rendering for Gemini
            loadConversationFromEvents(sessionId, container);
        }

        let transcriptPollInterval = null;

        function startTranscriptPolling(sessionId, container) {
            if (transcriptPollInterval) {
                clearInterval(transcriptPollInterval);
            }

            transcriptPollInterval = setInterval(async () => {
                const status = await checkTranscriptStatus(sessionId);
                if (status.gradium_available) {
                    clearInterval(transcriptPollInterval);
                    transcriptPollInterval = null;
                    // Reload conversation with Gradium transcript
                    await loadConversation(sessionId, container);
                }
            }, 5000); // Poll every 5 seconds
        }

        function getNoteForMessage(messageId) {
            const notes = JSON.parse(localStorage.getItem('message_notes') || '{}');
            return notes[messageId] || null;
        }

        function saveNoteForMessage(messageId, note) {
            const notes = JSON.parse(localStorage.getItem('message_notes') || '{}');
            if (note.trim()) {
                notes[messageId] = note.trim();
            } else {
                delete notes[messageId];
            }
            localStorage.setItem('message_notes', JSON.stringify(notes));
        }

        function toggleNoteInput(messageId) {
            const input = document.getElementById(`note-input-${messageId}`);
            const isActive = input.classList.contains('active');

            document.querySelectorAll('.note-input.active').forEach(el => {
                if (el.id !== `note-input-${messageId}`) el.classList.remove('active');
            });

            if (!isActive) {
                input.classList.add('active');
                const textarea = input.querySelector('textarea');
                textarea.value = getNoteForMessage(messageId) || '';
                textarea.focus();
            } else {
                input.classList.remove('active');
            }
        }

        function saveNote(messageId) {
            const input = document.getElementById(`note-input-${messageId}`);
            const textarea = input.querySelector('textarea');
            saveNoteForMessage(messageId, textarea.value);
            input.classList.remove('active');

            const sessionId = messageId.split('::')[0];
            const container = document.getElementById(`conversation-${sessionId}`);
            loadConversation(sessionId, container);
        }

        function cancelNote(messageId) {
            document.getElementById(`note-input-${messageId}`).classList.remove('active');
        }

        function getSessionIdFromUrl() {
            return new URLSearchParams(window.location.search).get('session');
        }

        function setSessionInUrl(sessionId) {
            const url = new URL(window.location);
            if (sessionId) {
                url.searchParams.set('session', sessionId);
            } else {
                url.searchParams.delete('session');
            }
            window.history.pushState({}, '', url);
        }

        function closeConversation(sessionId) {
            const conversation = document.getElementById(`conversation-${sessionId}`);
            if (conversation) {
                conversation.classList.remove('active');
                setSessionInUrl(null);
            }
        }

        function renderStages(stages) {
            if (!stages || stages.length === 0) return '';
            return `
                <div class="stages">
                    ${stages.map(stage => `
                        <span class="stage-item ${stage.status}">${stage.name}</span>
                    `).join('')}
                </div>
            `;
        }

        function renderSession(session) {
            const state = session.state || {};
            const customer = state.customer || {};
            const incident = state.incident || {};

            // Extract date and time separately
            const dateObj = session.created_at ? new Date(session.created_at) : null;
            const dateStr = dateObj ? dateObj.toLocaleDateString() : 'N/A';
            const timeStr = dateObj ? dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : 'N/A';

            const policyNumber = customer.policy_number || 'N/A';

            // Try to get customer name from state, fallback to extracting from transcript
            let customerName = customer.full_name || customer.caller_name || 'Unknown';

            // Get location from incident
            const location = incident.location || 'N/A';

            return `
                <tr class="session-row" data-session-id="${session.session_id}">
                    <td class="session-date-cell">${dateStr}</td>
                    <td class="session-time-cell">${timeStr}</td>
                    <td class="session-policy-cell">${escapeHtml(policyNumber)}</td>
                    <td class="session-customer-cell">${escapeHtml(customerName)}</td>
                    <td class="session-location-cell">${escapeHtml(location)}</td>
                </tr>
            `;
        }

        async function loadConversationFromEvents(sessionId, container) {
            const events = await fetchEvents(sessionId);

            const messages = events.filter(e =>
                (e.role === 'user' || e.role === 'agent' || e.role === 'model') &&
                (e.content || e.text) &&
                e.role !== 'system'
            );

            // Group consecutive messages from the same actor into one bubble
            const groups = [];
            for (const msg of messages) {
                const text = msg.content || msg.text || '';
                const last = groups[groups.length - 1];
                if (last && last.role === msg.role) {
                    last.texts.push(text);
                } else {
                    groups.push({ role: msg.role, texts: [text] });
                }
            }

            console.log('Filtered messages:', messages.length, '→', groups.length, 'groups');

            const messagesHtml = groups.length === 0
                ? '<div style="padding: 20px; text-align: center; color: var(--outline);">No messages in this session</div>'
                : groups.map((group, idx) => renderMessage(group, idx, sessionId)).join('');

            const header = container.querySelector('.conversation-header');
            container.innerHTML = '';
            if (header) {
                container.appendChild(header);
            } else {
                container.innerHTML = `
                    <div class="conversation-header">
                        <div class="conversation-title">
                            Conversation
                            <span class="transcript-badge gemini">Gemini Live</span>
                        </div>
                        <button class="close-conversation-btn" onclick="closeConversation('${sessionId}')">Close ✕</button>
                    </div>
                `;
            }
            const messagesDiv = document.createElement('div');
            messagesDiv.innerHTML = messagesHtml;
            container.appendChild(messagesDiv);
        }

        async function loadConversation(sessionId, container) {
            try {
                container.innerHTML = '<div class="loading">Loading conversation…</div>';

                // Fetch transcript (Gradium or Gemini)
                const transcriptData = await fetchTranscript(sessionId);

                if (!transcriptData) {
                    container.innerHTML = '<div class="error">No transcript available</div>';
                    return;
                }

                if (transcriptData.type === 'gradium' && transcriptData.format === 'json') {
                    // Render Gradium transcript with timestamps
                    renderGradiumTranscript(sessionId, container, transcriptData.transcript);
                } else {
                    // Render Gemini transcript (existing logic)
                    await loadConversationFromEvents(sessionId, container);
                    // Start polling for Gradium completion
                    startTranscriptPolling(sessionId, container);
                }
            } catch (error) {
                container.innerHTML = '<div class="error">Error loading conversation</div>';
                console.error('Error loading conversation:', error);
            }
        }

        let allSessions = [];
        let filteredSessions = [];

        function filterSessions(query) {
            if (!query.trim()) {
                filteredSessions = allSessions;
            } else {
                const lowerQuery = query.toLowerCase();
                filteredSessions = allSessions.filter(session => {
                    const state = session.state || {};
                    const customer = state.customer || {};
                    const incident = state.incident || {};

                    // Extract searchable fields
                    const dateStr = session.created_at ? new Date(session.created_at).toLocaleDateString().toLowerCase() : '';
                    const timeStr = session.created_at ? new Date(session.created_at).toLocaleTimeString().toLowerCase() : '';
                    const policyNumber = (customer.policy_number || '').toLowerCase();
                    const customerName = (customer.full_name || customer.caller_name || '').toLowerCase();
                    const location = (incident.location || '').toLowerCase();

                    // Search only in displayed columns
                    return dateStr.includes(lowerQuery) ||
                           timeStr.includes(lowerQuery) ||
                           policyNumber.includes(lowerQuery) ||
                           customerName.includes(lowerQuery) ||
                           location.includes(lowerQuery);
                });
            }
            updateFilterStats();
            renderSessionsList();
        }

        function updateFilterStats() {
            const stats = document.getElementById('filterStats');
            if (stats) stats.textContent = `${filteredSessions.length} of ${allSessions.length} sessions`;
        }

        function renderSessionsList() {
            const content = document.getElementById('content');
            if (filteredSessions.length === 0) {
                content.innerHTML = '<div class="no-sessions">No sessions match your filter.</div>';
                return;
            }
            content.innerHTML = `
                <div class="sessions-table-container">
                    <table class="sessions-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Time</th>
                                <th>Policy Number</th>
                                <th>Customer Name</th>
                                <th>Location</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${filteredSessions.map(renderSession).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            attachSessionClickHandlers();
        }

        function attachSessionClickHandlers() {
            document.querySelectorAll('.session-row').forEach(row => {
                row.addEventListener('click', async () => {
                    await showSessionDetail(row.dataset.sessionId);
                });
            });
        }

        async function showSessionDetail(sessionId) {
            document.getElementById('mainView').style.display = 'none';
            document.getElementById('detailView').classList.add('active');
            document.getElementById('backBtn').classList.add('visible');
            setSessionInUrl(sessionId);

            const session = allSessions.find(s => s.session_id === sessionId);
            if (!session) return;

            // Update page title
            document.querySelector('h1').textContent = `Detail view ${sessionId}`;

            const detailView = document.getElementById('detailView');
            const sid = session.session_id;
            const hasAudio = session.artifacts?.audio;
            const hasClaim = session.state != null;

            detailView.innerHTML = `
                <div class="session-card">
                    ${hasAudio ? `
                    <div class="audio-section">
                        <div class="section-label">Recording</div>
                        <audio class="audio-player" controls preload="metadata"
                               src="${API_BASE}/api/sessions/${sid}/audio"></audio>
                    </div>
                    ` : ''}

                    ${hasClaim ? `
                    <div class="claim-section">
                        <div class="claim-section-header">Claim State</div>

                        <!-- Always visible key details -->
                        <div class="claim-key-details">
                            ${renderKeyClaimDetails(session.state)}
                        </div>

                        <!-- Expandable additional details -->
                        <div class="claim-accordion">
                            <button class="claim-accordion-btn" onclick="toggleClaimBody('${sid}')">
                                <span class="claim-accordion-label">Additional Details & Raw JSON</span>
                                <svg class="claim-accordion-chevron" id="claim-icon-${sid}" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                                    <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </button>
                            <div class="claim-accordion-body" id="claim-body-${sid}">
                                <div class="claim-split">
                                    <div>
                                        <div class="claim-col-header">Additional Fields</div>
                                        ${renderAdditionalClaimDetails(session.state)}
                                    </div>
                                    <div>
                                        <div class="claim-col-header">Raw JSON</div>
                                        <div class="claim-raw-panel">
                                            <pre>${colorizeJson(session.state)}</pre>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    ` : ''}

                    <div class="conversation active" id="conversation-detail">
                        <div class="conversation-header">
                            <div class="conversation-title">Conversation</div>
                        </div>
                        <div class="loading">Loading conversation…</div>
                    </div>
                </div>
            `;

            await loadConversation(sessionId, document.getElementById('conversation-detail'));
        }

        function goBackToList() {
            document.getElementById('mainView').style.display = 'block';
            document.getElementById('detailView').classList.remove('active');
            document.getElementById('backBtn').classList.remove('visible');
            // Reset page title and set main URL
            document.querySelector('h1').textContent = 'Call Log Manager';
            // Set URL to /main
            window.history.pushState({}, '', '/main');
        }

        async function init() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading">Loading sessions…</div>';

            try {
                allSessions = await fetchSessions();
                filteredSessions = allSessions;
                console.log('Found sessions:', allSessions.length);

                if (!allSessions || allSessions.length === 0) {
                    content.innerHTML = '<div class="no-sessions">No sessions found. Start a session to see conversations here.</div>';
                    return;
                }

                updateFilterStats();
                renderSessionsList();

                const filterInput = document.getElementById('filterInput');
                if (filterInput) {
                    filterInput.addEventListener('input', e => filterSessions(e.target.value));
                }

                const urlSessionId = getSessionIdFromUrl();
                if (urlSessionId) {
                    await showSessionDetail(urlSessionId);
                } else {
                    // Set URL to /main when on list view
                    window.history.replaceState({}, '', '/main');
                }
            } catch (error) {
                content.innerHTML = `<div class="error">Failed to load sessions: ${error.message}</div>`;
            }
        }

        // Auto-refresh every 30 seconds (only when on list view)
        setInterval(() => {
            if (!document.getElementById('detailView')?.classList.contains('active')) init();
        }, 30000);

        init();
    </script>
</body>
</html>
